# ACI-specific variant of
# ../../observability/grafana/provisioning/datasources/datasources.yml.
# Only difference: URLs use localhost instead of the docker-compose
# service names (prometheus/loki/tempo) -- ACI container groups share
# one network namespace, so every container's ports are reachable at
# localhost, not at a per-container DNS name.
apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://localhost:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: loki
    url: http://localhost:3100
    access: proxy
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"(\w+)"'
          name: traceId
          url: '${__value.raw}'

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://localhost:3200
    access: proxy
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      lokiSearch:
        datasourceUid: loki
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift:   "1h"
        tags:
          - key: service.name
            value: service
