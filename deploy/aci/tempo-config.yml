# ACI-specific variant of ../../observability/tempo/tempo-config.yml.
#
# The image pulled by ACI for grafana/tempo:2.4.0 rejected two fields
# under storage.trace.block (index_downsample_bytes, encoding) as
# "not found in type common.BlockConfig" -- even though the exact same
# tag runs fine locally via docker-compose. Cause not fully root-caused
# (possibly a different manifest/build resolved under the same tag);
# rather than touch the working local config, those two fields are
# dropped here so the ACI deployment starts. They're storage-encoding
# tuning knobs, not required for correctness -- Tempo falls back to
# defaults.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period:  10s
  max_block_bytes:    1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window:         1h
    max_compaction_objects:    1000000
    block_retention:           72h
    compacted_block_retention: 10m

storage:
  trace:
    backend: local
    block:
      bloom_filter_false_positive: .05
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000
