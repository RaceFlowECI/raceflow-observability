version: "3.9"

# Stack de observabilidad RaceFlow
# Ejecutar desde este directorio: docker compose up -d
# Los servicios Spring Boot deben estar corriendo en el host (puertos 8080-8085)

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

services:

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: raceflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.4.0
    container_name: raceflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: raceflow2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.9.4
    container_name: raceflow-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.4
    container_name: raceflow-promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ../raceflow-api-gateway/logs:/logs/api-gateway:ro
      - ../raceflow-auth-service/logs:/logs/auth-service:ro
      - ../raceflow-room-service/logs:/logs/room-service:ro
      - ../raceflow-realtime-service/logs:/logs/realtime-service:ro
      - ../raceflow-session-service/logs:/logs/session-service:ro
      - ../raceflow-metrics-service/logs:/logs/metrics-service:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.4.0
    container_name: raceflow-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - observability
