apiVersion: 1

policies:
  - orgId: 1
    receiver: RaceFlow Webhook
    group_by: [alertname, grafana_folder]
    group_wait:      30s
    group_interval:  5m
    repeat_interval: 1h
    routes:
      - receiver: RaceFlow Webhook
        matchers:
          - severity = critical
        group_wait: 10s
      - receiver: RaceFlow Webhook
        matchers:
          - severity = warning
